name: Daily Marketing News

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 00:00 UTC = 09:00 JST
  workflow_dispatch:        # 手動実行ボタンも有効化

permissions:
  contents: write           # docs/ と sent_articles.json をコミットするため

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: npm start

      - name: Commit dashboard and sent_articles
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll sent_articles.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Update dashboard $(date -u '+%Y-%m-%d')"
          git push
