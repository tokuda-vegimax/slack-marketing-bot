<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マーケティングニュース ダッシュボード</title>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--sub:#666;--accent:#4361ee;--border:#e0e0e0;
  --score-high:#22c55e;--score-mid:#f59e0b;--score-low:#ef4444;
  --hd-bg:#1a1a2e;--hd-text:#fff;
  --tag-bg:#e8ecff;--btn-active:#4361ee;--btn-active-text:#fff;
}
body.dark{
  --bg:#0f0f1a;--card:#1e1e30;--text:#e8e8f0;--sub:#9090b0;--accent:#7b93ff;--border:#2e2e48;
  --hd-bg:#0a0a18;--hd-text:#e8e8f0;
  --tag-bg:#2a2a44;--btn-active:#7b93ff;--btn-active-text:#0f0f1a;
}
@media(prefers-color-scheme:dark){body:not(.light){
  --bg:#0f0f1a;--card:#1e1e30;--text:#e8e8f0;--sub:#9090b0;--accent:#7b93ff;--border:#2e2e48;
  --hd-bg:#0a0a18;--hd-text:#e8e8f0;
  --tag-bg:#2a2a44;--btn-active:#7b93ff;--btn-active-text:#0f0f1a;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--hd-bg);color:var(--hd-text);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header h1{font-size:1.25rem;font-weight:700;}
header p{font-size:.8rem;opacity:.65;margin-top:2px;}
.hd-right{display:flex;gap:8px;align-items:center;}
.dark-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--hd-text);padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;}
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;flex-direction:column;gap:10px;}
.toolbar-top{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.sort-group{display:flex;gap:4px;flex-wrap:wrap;}
.sort-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text);cursor:pointer;font-size:.8rem;transition:all .15s;white-space:nowrap;}
.sort-btn.active{background:var(--btn-active);color:var(--btn-active-text);border-color:var(--btn-active);}
.search-box{margin-left:auto;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.82rem;min-width:200px;outline:none;}
.search-box:focus{border-color:var(--accent);}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.filter-row-label{font-size:.78rem;color:var(--sub);margin-right:2px;}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text);cursor:pointer;font-size:.78rem;transition:all .15s;white-space:nowrap;}
.filter-btn.active{background:var(--btn-active);color:var(--btn-active-text);border-color:var(--btn-active);}
.stats-row{font-size:.78rem;color:var(--sub);}
.content{padding:20px 24px;}
.section-header{font-size:1rem;font-weight:700;color:var(--text);margin:0 0 12px;padding:8px 0;border-bottom:2px solid var(--border);display:flex;align-items:baseline;gap:8px;}
.section-count{font-size:.75rem;font-weight:400;color:var(--sub);}
.date-section{margin-bottom:28px;}
.cards-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:9px;transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.1);}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.source-badge{font-size:.7rem;font-weight:600;padding:2px 9px;border-radius:10px;background:var(--tag-bg);color:var(--accent);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;}
.score-badge{font-size:.78rem;font-weight:700;padding:2px 9px;border-radius:10px;color:#fff;white-space:nowrap;flex-shrink:0;}
.score-high{background:var(--score-high);}.score-mid{background:var(--score-mid);}.score-low{background:var(--score-low);}
.card-title{font-size:.92rem;font-weight:600;line-height:1.45;}
.card-title a{color:var(--text);text-decoration:none;}
.card-title a:hover{color:var(--accent);text-decoration:underline;}
.card-stars{font-size:.82rem;color:#f59e0b;letter-spacing:.5px;}
.card-reason{font-size:.76rem;color:var(--sub);font-style:italic;}
.card-summary{font-size:.8rem;color:var(--sub);line-height:1.65;border-left:3px solid var(--border);padding-left:10px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;font-size:.73rem;color:var(--sub);margin-top:2px;}
.card-footer a{color:var(--accent);text-decoration:none;font-weight:600;}
.card-footer a:hover{text-decoration:underline;}
.empty{text-align:center;padding:60px;color:var(--sub);}
.loading{text-align:center;padding:60px;color:var(--sub);font-size:1rem;}
@media(max-width:640px){
  header,.toolbar,.content{padding:12px 14px;}
  .search-box{min-width:140px;}
  .cards-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<header>
  <div><h1>📊 マーケティングニュース ダッシュボード</h1><p>運用型広告実務担当者向け 直近30日間の厳選記事</p></div>
  <div class="hd-right"><button class="dark-btn" id="darkBtn">🌙 ダーク</button></div>
</header>
<div class="toolbar">
  <div class="toolbar-top">
    <div class="sort-group">
      <button class="sort-btn active" data-sort="date">📅 日付順</button>
      <button class="sort-btn" data-sort="score">⭐ スコア順</button>
      <button class="sort-btn" data-sort="source">📁 ソース別</button>
    </div>
    <input class="search-box" id="searchBox" type="search" placeholder="🔍 タイトル・要約を検索...">
  </div>
  <div class="filter-row" id="sourceFilters">
    <span class="filter-row-label">ソース:</span>
  </div>
  <div class="stats-row" id="statsRow">読み込み中...</div>
</div>
<div class="content" id="content"><div class="loading">📰 記事を読み込み中...</div></div>
<script src="articles.js"></script>
<script>
var state = { source: "all", sort: "date", search: "" };

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function sc(n) { return n >= 8 ? "score-high" : n >= 5 ? "score-mid" : "score-low"; }
function stars(n) { return "★".repeat(n) + "☆".repeat(10 - n); }
function dateLabel(d) {
  var today = new Date().toISOString().slice(0,10);
  var yest  = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (d === today) return "今日";
  if (d === yest)  return "昨日";
  var p = d.split("-"); return parseInt(p[1]) + "月" + parseInt(p[2]) + "日";
}

function cardHTML(a) {
  return "<div class=\"card\">" +
    "<div class=\"card-top\">" +
      "<span class=\"source-badge\">" + esc(a.source) + "</span>" +
      "<span class=\"score-badge " + sc(a.score) + "\">" + a.score + "/10</span>" +
    "</div>" +
    "<div class=\"card-title\"><a href=\"" + esc(a.link) + "\" target=\"_blank\" rel=\"noopener\">" + esc(a.title) + "</a></div>" +
    "<div class=\"card-stars\">" + stars(a.score) + "</div>" +
    (a.reason ? "<div class=\"card-reason\">💡 " + esc(a.reason) + "</div>" : "") +
    (a.summary ? "<div class=\"card-summary\">" + esc(a.summary).replace(/\n/g,"<br>") + "</div>" : "") +
    "<div class=\"card-footer\">" +
      "<span>📅 " + a.date.replace(/-/g,"/") + "</span>" +
      "<a href=\"" + esc(a.link) + "\" target=\"_blank\" rel=\"noopener\">記事を読む →</a>" +
    "</div>" +
  "</div>";
}

function applyFilters(data) {
  var items = data;
  if (state.source !== "all") items = items.filter(function(a){ return a.source === state.source; });
  if (state.search) {
    var q = state.search.toLowerCase();
    items = items.filter(function(a){
      return a.title.toLowerCase().indexOf(q) >= 0 || (a.summary||"").toLowerCase().indexOf(q) >= 0;
    });
  }
  return items;
}

function renderByDate(items) {
  var sorted = items.slice().sort(function(a,b){ return b.date.localeCompare(a.date)||b.score-a.score; });
  var groups = {}; var order = [];
  sorted.forEach(function(a){
    if (!groups[a.date]){ groups[a.date]=[]; order.push(a.date); }
    groups[a.date].push(a);
  });
  return order.map(function(d){
    return "<section class=\"date-section\">" +
      "<h2 class=\"section-header\">" + dateLabel(d) +
        "<span class=\"section-count\">" + groups[d].length + "件</span></h2>" +
      "<div class=\"cards-grid\">" + groups[d].map(cardHTML).join("") + "</div>" +
    "</section>";
  }).join("");
}

function renderByScore(items) {
  var sorted = items.slice().sort(function(a,b){ return b.score-a.score||b.date.localeCompare(a.date); });
  return "<div class=\"cards-grid\">" + sorted.map(cardHTML).join("") + "</div>";
}

function renderBySource(items) {
  var groups = {}; var order = [];
  items.slice().sort(function(a,b){ return a.source.localeCompare(b.source)||b.date.localeCompare(a.date); })
    .forEach(function(a){
      if (!groups[a.source]){ groups[a.source]=[]; order.push(a.source); }
      groups[a.source].push(a);
    });
  return order.map(function(s){
    return "<section class=\"date-section\">" +
      "<h2 class=\"section-header\">" + esc(s) +
        "<span class=\"section-count\">" + groups[s].length + "件</span></h2>" +
      "<div class=\"cards-grid\">" + groups[s].map(cardHTML).join("") + "</div>" +
    "</section>";
  }).join("");
}

function render() {
  var data  = window.ARTICLES_DATA || [];
  var items = applyFilters(data);
  document.getElementById("statsRow").textContent = items.length + "件 / 全" + data.length + "件";
  var content = document.getElementById("content");
  if (!items.length) { content.innerHTML = "<div class=\"empty\">該当する記事がありません</div>"; return; }
  switch (state.sort) {
    case "date":   content.innerHTML = renderByDate(items);   break;
    case "score":  content.innerHTML = renderByScore(items);  break;
    case "source": content.innerHTML = renderBySource(items); break;
  }
}

function buildSourceFilters() {
  var data    = window.ARTICLES_DATA || [];
  var sources = data.map(function(a){ return a.source; })
    .filter(function(s,i,arr){ return arr.indexOf(s)===i; }).sort();
  var container = document.getElementById("sourceFilters");
  function makeBtn(src, label, active) {
    var btn = document.createElement("button");
    btn.className = "filter-btn" + (active ? " active" : "");
    btn.dataset.source = src;
    btn.textContent = label;
    container.appendChild(btn);
  }
  makeBtn("all", "すべて", true);
  sources.forEach(function(s){ makeBtn(s, s, false); });
  // イベント委譲（inline onclickを使わない → ソース名の文字コード問題を回避）
  container.addEventListener("click", function(e) {
    var btn = e.target.closest(".filter-btn");
    if (!btn) return;
    container.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    state.source = btn.dataset.source;
    render();
  });
}

// ダークモード: OS設定優先、ボタンで手動切替
document.getElementById("darkBtn").addEventListener("click", function() {
  var b = document.body;
  if (b.classList.contains("dark")) { b.classList.remove("dark"); b.classList.add("light"); }
  else { b.classList.remove("light"); b.classList.add("dark"); }
});

// ソートボタン
document.querySelectorAll(".sort-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".sort-btn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    state.sort = btn.dataset.sort;
    render();
  });
});

// 検索ボックス（リアルタイム）
document.getElementById("searchBox").addEventListener("input", function(e) {
  state.search = e.target.value.trim();
  render();
});

buildSourceFilters();
render();
</script>
</body>
</html>
